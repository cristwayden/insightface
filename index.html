<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhận Diện Khuôn Mặt (Web Test)</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #222; color: white; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 400px; border-radius: 10px; background: #000; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; margin-top: 20px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:disabled { background-color: #555; }
        #result { margin-top: 20px; font-size: 20px; font-weight: bold; color: #00ff00; }
        canvas { display: none; }
    </style>
</head>
<body>

    <div style="margin-bottom: 20px;">
        <a href="register.html" style="color: #3498db; text-decoration: none; font-size: 18px;">➡ Đi tới trang Lấy Mẫu (Đăng ký)</a>
    </div>
    <h2>Máy quét khuôn mặt</h2>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <br>
    <button id="scanBtn">Quét Khuôn Mặt</button>
    
    <div id="result">Chưa nhận diện</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scanBtn = document.getElementById('scanBtn');
        const resultDiv = document.getElementById('result');

        // Bật camera trước
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => { resultDiv.innerText = "Lỗi mở camera: " + err; resultDiv.style.color = "red"; });

        scanBtn.addEventListener('click', async () => {
            scanBtn.disabled = true;
            resultDiv.innerText = "Đang xử lý...";
            resultDiv.style.color = "yellow";

            // Chụp khung hình từ video vào canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            // Chuyển ảnh thành file blob (JPEG)
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');

                try {
                    // LƯU Ý: Gửi đến API. Cần cấu hình đúng IP máy chủ nếu mở từ thiết bị khác.
                    // Nếu mở file index.html trên máy tính (URL file://) thì hostname sẽ rỗng, ta dùng '127.0.0.1'.
                    const host = window.location.hostname || "127.0.0.1";
                    const serverUrl = `http://${host}:8000/recognize`;
                    
                    const response = await fetch(serverUrl, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const data = await response.json();
                    
                    if (data.status === 'success' && data.faces.length > 0) {
                        const face = data.faces[0];
                        if (face.is_real) {
                            resultDiv.innerText = `${face.name} (Người thật - Khớp: ${face.score.toFixed(2)}, Sống: ${face.liveness_score.toFixed(2)})`;
                            resultDiv.style.color = "#00ff00"; // Xanh
                        } else {
                            resultDiv.innerText = `CẢNH BÁO GIẢ MẠO! ${face.name} (Khớp: ${face.score.toFixed(2)}, Sống: ${face.liveness_score.toFixed(2)})`;
                            resultDiv.style.color = "red"; // Đỏ
                        }
                    } else if (data.status === 'success' && data.faces.length === 0) {
                        resultDiv.innerText = "Không tìm thấy khuôn mặt";
                        resultDiv.style.color = "orange";
                    } else {
                        resultDiv.innerText = "Lỗi API: " + data.message;
                        resultDiv.style.color = "red";
                    }
                } catch (error) {
                    resultDiv.innerText = "Lỗi kết nối máy chủ";
                    resultDiv.style.color = "red";
                }
                scanBtn.disabled = false;
            }, 'image/jpeg');
        });
    </script>
</body>
</html>
