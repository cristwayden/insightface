<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightFace — Manage Database</title>
  <meta name="description" content="Manage registered faces in the database" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

</head>
<body>
<div class="container container-sm" style="max-width: 1400px;">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">👁</div>
      <div class="logo-text">
        <h1>InsightFace</h1>
        <p>Manage Database</p>
      </div>
    </div>
    <nav>
      <a class="nav-btn" href="/" id="nav-recognize">Recognize</a>
      <a class="nav-btn" href="/register" id="nav-register">Register</a>
      <a class="nav-btn active" href="/manage" id="nav-manage">Manage</a>
    </nav>
    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Main Content -->
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; margin-top: 20px;">
    
    <!-- Registered Faces -->
    <div class="card" style="margin-top: 0;">
      <div class="card-title">👥 Registered Faces (<span id="totalCount">0</span>)</div>
      
      <div class="table-wrapper">
        <table id="facesTable">
          <thead>
            <tr>
              <th>Employee ID</th>
              <th>Name</th>
              <th style="width: 120px; text-align: center;">Actions</th>
            </tr>
          </thead>
          <tbody id="facesTbody">
            <tr><td colspan="3" style="text-align: center; color: var(--text-muted); padding: 30px;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Logs Content -->
    <div class="card" style="margin-top: 0;">
      <div class="card-title">📋 Recognition Logs</div>
      
      <div class="table-wrapper">
        <table id="logsTable">
          <thead>
            <tr>
              <th>Time</th>
              <th>Name</th>
              <th>Match</th>
              <th>Liveness</th>
              <th>GPS</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="logsTbody">
            <tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">Loading logs...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div> <!-- /grid -->

</div><!-- /container -->

<script>
  const API_BASE = window.location.protocol.startsWith('http')
    ? `${window.location.origin}/api/v1`
    : 'http://127.0.0.1:5005/api/v1';

  // ── Server health check ──
  async function checkServer() {
    try {
      const healthUrl = window.location.protocol.startsWith('http')
        ? '/'
        : 'http://127.0.0.1:5005/';
      const r = await fetch(healthUrl);
      if (r.ok) {
        document.getElementById('statusDot').style.background = 'var(--success)';
        document.getElementById('statusText').textContent = 'Server online';
      } else throw new Error();
    } catch {
      document.getElementById('statusDot').style.background = 'var(--danger)';
      document.getElementById('statusText').textContent = 'Server offline';
    }
  }
  checkServer();
  setInterval(checkServer, 10000);

  // ── Load Faces ──
  async function loadFaces() {
    try {
      const resp = await fetch(`${API_BASE}/faces`);
      const data = await resp.json();
      
      const tbody = document.getElementById('facesTbody');
      const count = document.getElementById('totalCount');
      
      if (resp.ok && data.status === 'success') {
        count.textContent = data.total;
        
        if (data.total === 0) {
           tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: var(--text-muted); padding: 30px;">No faces registered in database.</td></tr>';
           return;
        }

        tbody.innerHTML = data.faces.map(face => `
          <tr>
            <td style="font-family: monospace; font-size: 0.9em; color: var(--text-muted);">${escHtml(face.emp_id)}</td>
            <td style="font-weight: 500;">${escHtml(face.name)}</td>
            <td style="text-align: center;">
              <button class="action-btn btn-edit" title="Rename" onclick="renameFace('${escHtml(face.emp_id)}', '${escHtml(face.name)}')">✏️</button>
              <button class="action-btn btn-delete" title="Delete" onclick="deleteFace('${escHtml(face.emp_id)}', '${escHtml(face.name)}')">🗑️</button>
            </td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--danger); padding: 30px;">Error loading data: ${data.detail || data.message || 'Unknown error'}</td></tr>`;
      }
    } catch (e) {
      document.getElementById('facesTbody').innerHTML = `<tr><td colspan="3" style="text-align: center; color: var(--danger); padding: 30px;">❌ Cannot connect to server.</td></tr>`;
    }
  }

  // ── Delete ──
  async function deleteFace(empId, name) {
    if (!confirm(`Are you sure you want to delete the face data for "${name}"?\nThis action cannot be undone.`)) return;
    
    try {
      const resp = await fetch(`${API_BASE}/faces/${empId}`, { method: 'DELETE' });
      if (resp.ok) {
        loadFaces();
      } else {
        const data = await resp.json();
        alert(`Error: ${data.detail || data.message || 'Failed to delete'}`);
      }
    } catch (e) {
      alert("Network error while trying to connect to the server.");
    }
  }

  // ── Rename ──
  async function renameFace(empId, oldName) {
    const newName = prompt(`Enter new name for "${oldName}":`, oldName);
    if (newName === null) return; // cancelled
    
    const trimmed = newName.trim();
    if (trimmed === oldName || trimmed === '') return;
    
    try {
      const resp = await fetch(`${API_BASE}/faces/${empId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: trimmed })
      });
      if (resp.ok) {
        loadFaces();
      } else {
        const data = await resp.json();
        alert(`Error: ${data.detail || data.message || 'Failed to rename'}`);
      }
    } catch (e) {
      alert("Network error while trying to connect to the server.");
    }
  }

  // ── Load Logs ──
  async function loadLogs() {
    try {
      const resp = await fetch(`${API_BASE}/logs?lines=500`);
      const data = await resp.json();
      
      const tbody = document.getElementById('logsTbody');
      
      if (resp.ok && data.recent_logs) {
        const parsedLogs = [];
        const lines = data.recent_logs.reverse();
        for (const line of lines) {
          if (line.includes('[RECOGNIZE] IP:')) {
             const timeMatch = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})/);
             const nameMatch = line.match(/Name:\s([^|]+)/);
             const matchMatch = line.match(/Match:\s([\d.]+)/);
             const liveMatch = line.match(/Liveness:\s([\d.]+)/);
             const gpsMatch = line.match(/GPS:\s([^|]+)/);
             
             if (timeMatch && nameMatch) {
                const name = nameMatch[1].trim();
                const isMatched = name !== 'Stranger';
                parsedLogs.push({
                   time: timeMatch[1],
                   name: name,
                   match: matchMatch ? matchMatch[1].trim() : '-',
                   liveness: liveMatch ? liveMatch[1].trim() : '-',
                   gps: gpsMatch ? gpsMatch[1].trim() : '-',
                   status: isMatched ? 'MATCH' : 'UNMATCHED'
                });
             }
          }
        }
        
        if (parsedLogs.length === 0) {
           tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: var(--text-muted); padding: 30px;">No recognition logs found.</td></tr>';
           return;
        }

        // Only show top 50
        tbody.innerHTML = parsedLogs.slice(0, 50).map(log => `
          <tr>
            <td style="font-family: monospace; font-size: 0.85em; color: var(--text-muted);">${escHtml(log.time)}</td>
            <td style="font-weight: 500;">${escHtml(log.name)}</td>
            <td>${escHtml(log.match)}</td>
            <td>${escHtml(log.liveness)}</td>
            <td style="font-size: 0.8em; color: var(--text-muted);">${escHtml(log.gps)}</td>
            <td>
              ${log.status === 'MATCH' 
                ? '<span class="badge" style="background: rgba(46,204,113,0.1); color: var(--success); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 600;">MATCH</span>' 
                : '<span class="badge" style="background: rgba(231,76,60,0.1); color: var(--danger); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: 600;">UNMATCHED</span>'}
            </td>
          </tr>
        `).join('');
      } else {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: var(--danger); padding: 30px;">Error loading logs: ${data.detail || data.message || 'Unknown error'}</td></tr>`;

      }
    } catch (e) {
      document.getElementById('logsTbody').innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--danger); padding: 30px;">❌ Cannot connect to server to fetch logs.</td></tr>`;
    }
  }

  // ── Helpers ──
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Init
  loadFaces();
  loadLogs();
  
  // Refresh logs every 10 seconds
  setInterval(loadLogs, 10000);
</script>
</body>
</html>
