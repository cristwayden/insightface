<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightFace — Registration</title>
  <meta name="description" content="Register new employee faces into the system" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="container container-sm">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">👁</div>
      <div class="logo-text">
        <h1>InsightFace</h1>
        <p>Face Registration</p>
      </div>
    </div>
    <nav>
      <a class="nav-btn" href="/" id="nav-recognize">Recognize</a>
      <a class="nav-btn active" href="/register" id="nav-register">Register</a>
      <a class="nav-btn" href="/manage" id="nav-manage">Manage</a>
    </nav>
    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Main Content -->
  <div class="card">
    <div class="card-title">📝 Register New Face</div>
    
    <div class="form-group">
      <label class="form-label" for="employeeName">Employee Full Name</label>
      <input type="text" id="employeeName" class="form-input" placeholder="Example: John Doe" autocomplete="off" />
    </div>

    <div class="form-label">Portrait Photo</div>
    <div class="camera-wrap">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="guide-overlay"></div>
      <div class="cam-placeholder" id="camPlaceholder">
        <div class="cam-placeholder-icon">📷</div>
        <div>Initializing camera...</div>
      </div>
    </div>

    <div id="resultMsg" class="result-msg" style="margin-bottom: 15px;"></div>

    <div style="display: flex; gap: 10px; flex-direction: column;">
      <button class="btn btn-success" id="registerBtn">
        <span>📸</span> Capture & Register
      </button>
      <button class="btn btn-danger" id="cancelBtn" style="display: none;">
        <span>🚫</span> Cancel
      </button>
    </div>
  </div>

</div><!-- /container -->

<script>
  const API_BASE = window.location.protocol.startsWith('http')
    ? `${window.location.origin}/api/v1`
    : 'http://127.0.0.1:5005/api/v1';

  const video       = document.getElementById('video');
  const canvas      = document.getElementById('canvas');
  const registerBtn = document.getElementById('registerBtn');
  const nameInput   = document.getElementById('employeeName');
  const resultMsg   = document.getElementById('resultMsg');
  const placeholder = document.getElementById('camPlaceholder');

  // ── Server health check ──
  async function checkServer() {
    try {
      const healthUrl = window.location.protocol.startsWith('http')
        ? '/'
        : 'http://127.0.0.1:5005/';
      const r = await fetch(healthUrl);
      if (r.ok) {
        document.getElementById('statusDot').style.background = 'var(--success)';
        document.getElementById('statusText').textContent = 'Server online';
      } else throw new Error();
    } catch {
      document.getElementById('statusDot').style.background = 'var(--danger)';
      document.getElementById('statusText').textContent = 'Server offline';
    }
  }
  checkServer();
  setInterval(checkServer, 10000);

  // ── Camera ──
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(stream => {
      video.srcObject = stream;
      placeholder.style.display = 'none';
    })
    .catch(err => {
      placeholder.innerHTML = `<div class="cam-placeholder-icon">⚠️</div><div style="color:var(--danger)">Cannot open camera<br><small>${err.message}</small></div>`;
    });

  const cancelBtn = document.getElementById('cancelBtn');

  let captureTargets = ["straight", "left", "right"];
  let currentTargetIdx = 0;
  let capturedBlobs = [];
  let analyzing = false;
  let isCapturing = false;
  let timeoutId = null;
  let stableStartTime = 0;
  const STABLE_DURATION = 300; // ms to hold still
  const TIMEOUT_DURATION = 20000; // 20s

  cancelBtn.addEventListener('click', () => {
    resetCaptureState();
    showResult('error', 'Capture cancelled by user.');
  });

  function resetCaptureState() {
    isCapturing = false;
    analyzing = false;
    clearTimeout(timeoutId);
    registerBtn.style.display = 'block';
    cancelBtn.style.display = 'none';
    registerBtn.disabled = false;
    registerBtn.innerHTML = '<span>📸</span> Capture & Register';
    document.querySelector('.guide-overlay').style.borderColor = 'rgba(255, 255, 255, 0.2)';
  }

  // ── Register ──
  registerBtn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    if (!name) {
      showResult('error', 'Please enter the employee name!');
      nameInput.focus();
      return;
    }

    if (registerBtn.disabled) return;
    
    isCapturing = true;
    currentTargetIdx = 0;
    capturedBlobs = [];
    stableStartTime = 0;
    
    registerBtn.style.display = 'none';
    cancelBtn.style.display = 'block';
    
    timeoutId = setTimeout(() => {
        if (isCapturing) {
            resetCaptureState();
            showResult('error', 'Timeout: Could not capture all poses within 20 seconds.');
        }
    }, TIMEOUT_DURATION);

    showResult('info', 'Starting capture sequence...');
    analyzeLoop();
  });

  async function analyzeLoop() {
    if (!isCapturing) return;
    if (currentTargetIdx >= captureTargets.length) {
       uploadCapturedBlobs();
       return;
    }
    
    if (analyzing) return;
    analyzing = true;
    
    const target = captureTargets[currentTargetIdx];
    let instruction = "";
    if (target === "straight") instruction = "Look STRAIGHT at the camera";
    if (target === "left") instruction = "Turn your head slowly LEFT";
    if (target === "right") instruction = "Turn your head slowly RIGHT";
    
    showResult('info', `Step ${currentTargetIdx + 1}/3: ${instruction}`);

    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);

    try {
        const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.8));
        const fd = new FormData();
        fd.append('file', blob, 'frame.jpg');
        
        const resp = await fetch(`${API_BASE}/analyze_pose`, { method: 'POST', body: fd });
        const data = await resp.json();
        
        if (data.has_face) {
            const [pitch, yaw, roll] = data.pose;
            let isMatch = false;
            
            // Note: yaw direction depends on mirror. Usually positive is looking left (from camera's perspective).
            if (target === "straight" && Math.abs(yaw) < 15 && Math.abs(pitch) < 15) {
                isMatch = true;
            } else if (target === "left" && yaw > 25) { 
                isMatch = true;
            } else if (target === "right" && yaw < -25) {
                isMatch = true;
            }
            
            const overlay = document.querySelector('.guide-overlay');
            if (isMatch) {
                if (stableStartTime === 0) {
                    stableStartTime = Date.now();
                }
                const holdTime = Date.now() - stableStartTime;
                if (holdTime < STABLE_DURATION) {
                    showResult('warning', 'Good! HOLD STILL...');
                    overlay.style.borderColor = 'var(--warning)';
                } else {
                    capturedBlobs.push(blob);
                    currentTargetIdx++;
                    stableStartTime = 0;
                    
                    overlay.style.backgroundColor = 'rgba(255,255,255,0.5)';
                    setTimeout(() => { overlay.style.backgroundColor = 'transparent'; }, 100);
                }
            } else {
                stableStartTime = 0;
                overlay.style.borderColor = 'rgba(255, 255, 255, 0.2)';
            }
        }
    } catch (err) {
        console.error("Pose analysis error:", err);
    }
    
    analyzing = false;
    if (isCapturing) {
        setTimeout(analyzeLoop, 200);
    }
  }

  async function uploadCapturedBlobs() {
    isCapturing = false;
    clearTimeout(timeoutId);
    
    cancelBtn.style.display = 'none';
    registerBtn.style.display = 'block';
    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner"></span> Processing...';
    showResult('info', 'Extracting and averaging 3 face angles...');
    
    const fd = new FormData();
    capturedBlobs.forEach((b, i) => fd.append('files', b, `capture_${i}.jpg`));
    fd.append('name', nameInput.value.trim());

    try {
        const resp = await fetch(`${API_BASE}/register`, { method: 'POST', body: fd });
        const data = await resp.json();

        if (resp.ok && data.status === 'success') {
          showResult('success', `✅ ${data.message}`);
          nameInput.value = '';
        } else {
          showResult('error', `❌ Error: ${data.detail?.message || data.message || 'Unknown error'}`);
        }
    } catch (err) {
        showResult('error', '❌ Cannot connect to server.');
    }

    registerBtn.disabled = false;
    registerBtn.innerHTML = '<span>📸</span> Capture & Register';
  }

  // ── Helpers ──
  function showResult(type, msg) {
    resultMsg.className = `result-msg ${type}`;
    resultMsg.innerHTML = escHtml(msg);
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  
  function handleEnter(e) {
    if (e.key === 'Enter') {
      registerBtn.click();
    }
  }
  nameInput.addEventListener('keypress', handleEnter);
</script>
</body>
</html>
