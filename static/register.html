<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InsightFace — Registration</title>
  <meta name="description" content="Register new employee faces into the system" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- MediaPipe FaceMesh: runs 100% in browser, no server calls needed -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>


</head>
<body>
<div class="container container-sm">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">👁</div>
      <div class="logo-text">
        <h1>InsightFace</h1>
        <p>Face Registration</p>
      </div>
    </div>
    <nav>
      <a class="nav-btn" href="/" id="nav-recognize">Recognize</a>
      <a class="nav-btn active" href="/register" id="nav-register">Register</a>
      <a class="nav-btn" href="/manage" id="nav-manage">Manage</a>
    </nav>
    <div class="status-bar" id="statusBar">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Main Content -->
  <div class="card">
    <div class="card-title">📝 Register New Face</div>
    
    <div class="form-group">
      <label class="form-label" for="employeeName">Employee Full Name</label>
      <input type="text" id="employeeName" class="form-input" placeholder="Example: John Doe" autocomplete="off" />
    </div>

    <!-- Pose step indicators (shown when capturing) -->
    <div class="pose-steps" id="poseSteps" style="display:none;"></div>

    <div class="form-label">Portrait Photo</div>
    <div class="camera-wrap" style="position:relative;">
      <video id="video" autoplay playsinline></video>
      <canvas id="canvas" style="display:none;"></canvas>
      <canvas id="meshCanvas"></canvas>

      <!-- Hold ring SVG -->
      <svg id="holdRing" width="90" height="90" viewBox="0 0 90 90">
        <circle class="track" cx="45" cy="45" r="38"/>
        <circle class="fill" id="ringFill" cx="45" cy="45" r="38"
          stroke-dasharray="238.76"
          stroke-dashoffset="238.76"/>
      </svg>

      <div id="poseIndicator"></div>
      <div class="cam-placeholder" id="camPlaceholder">
        <div class="cam-placeholder-icon">📷</div>
        <div>Initializing camera...</div>
      </div>
      <div class="capture-flash" id="captureFlash"></div>
    </div>

    <div id="resultMsg" class="result-msg" style="margin-bottom: 15px;"></div>

    <div style="display: flex; gap: 10px; flex-direction: column;">
      <button class="btn btn-success" id="registerBtn">
        <span>📸</span> Capture &amp; Register
      </button>
      <button class="btn btn-danger" id="cancelBtn" style="display: none;">
        <span>🚫</span> Cancel
      </button>
    </div>
  </div>

</div><!-- /container -->

<script>
  // ─────────────────────────────────────────────
  //  CONFIG
  // ─────────────────────────────────────────────
  const API_BASE = window.location.protocol.startsWith('http')
    ? `${window.location.origin}/api/v1`
    : 'http://127.0.0.1:5005/api/v1';

  // Sequence of angles to capture
  const CAPTURE_TARGETS = [
    { id: 'straight', label: 'Look STRAIGHT',  emoji: '😐', check: p => Math.abs(p.yaw) < 13 && Math.abs(p.pitch) < 13 },
    { id: 'left',     label: 'Turn LEFT ←', emoji: '👈', check: p => p.yaw > 22 },
    { id: 'right',    label: 'Turn RIGHT →', emoji: '👉', check: p => p.yaw < -22 },
  ];


  const STABLE_MS  = 600;   // ms to hold pose before capturing
  const TIMEOUT_MS = 60000; // session timeout
  const RING_CIRC  = 238.76; // 2 * PI * 38 (radius of SVG circle)

  // ─────────────────────────────────────────────
  //  DOM refs
  // ─────────────────────────────────────────────
  const video         = document.getElementById('video');
  const canvas        = document.getElementById('canvas');
  const meshCanvas    = document.getElementById('meshCanvas');
  const registerBtn   = document.getElementById('registerBtn');
  const cancelBtn     = document.getElementById('cancelBtn');
  const nameInput     = document.getElementById('employeeName');
  const resultMsg     = document.getElementById('resultMsg');
  const placeholder   = document.getElementById('camPlaceholder');
  const poseStepsEl   = document.getElementById('poseSteps');
  const poseIndicator = document.getElementById('poseIndicator');
  const holdRing      = document.getElementById('holdRing');
  const ringFill      = document.getElementById('ringFill');
  const captureFlash  = document.getElementById('captureFlash');

  // ─────────────────────────────────────────────
  //  State
  // ─────────────────────────────────────────────
  let isCapturing   = false;
  let currentStep   = 0;
  let capturedBlobs = [];
  let stableStart   = 0;
  let timeoutId     = null;
  let faceMeshReady = false;
  let mpCamera      = null;
  let isProcessingCapture = false;
  let poseResetRequired = false; // must leave previous pose zone before next step

  // ─────────────────────────────────────────────
  //  Server health check
  // ─────────────────────────────────────────────
  async function checkServer() {
    try {
      const r = await fetch(window.location.protocol.startsWith('http') ? '/' : 'http://127.0.0.1:5005/');
      if (r.ok) {
        document.getElementById('statusDot').style.background = 'var(--success)';
        document.getElementById('statusText').textContent = 'Server online';
      } else throw new Error();
    } catch {
      document.getElementById('statusDot').style.background = 'var(--danger)';
      document.getElementById('statusText').textContent = 'Server offline';
    }
  }
  checkServer();
  setInterval(checkServer, 10000);

  // ─────────────────────────────────────────────
  //  Camera
  // ─────────────────────────────────────────────
  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } } })
    .then(stream => {
      video.srcObject = stream;
      placeholder.style.display = 'none';
      // Start MediaPipe as soon as camera is ready
      // => Oval displays as soon as face is detected, no button press needed
      video.addEventListener('loadeddata', () => initFaceMesh(), { once: true });
    })
    .catch(err => {
      placeholder.innerHTML = `<div class="cam-placeholder-icon">⚠️</div><div style="color:var(--danger)">Cannot open camera<br><small>${err.message}</small></div>`;
    });

  // ─────────────────────────────────────────────
  //  MediaPipe FaceMesh — head pose from 468 landmarks
  //  Runs 100% in browser, 0 server requests
  // ─────────────────────────────────────────────

  /**
   * Estimate yaw/pitch from MediaPipe landmarks.
   * Use ratio of nose position to cheeks (yaw) and chin-forehead (pitch).
   */
  function estimatePose(lm) {
    const nose      = lm[1];
    const chin      = lm[152];
    const forehead  = lm[10];
    const leftCheek  = lm[234];
    const rightCheek = lm[454];

    const faceW = Math.abs(rightCheek.x - leftCheek.x) || 0.001;
    const faceH = Math.abs(chin.y - forehead.y)         || 0.001;

    const midX  = (leftCheek.x + rightCheek.x) / 2;
    const midY  = (chin.y + forehead.y) / 2;

    // Scale to approximate degrees
    const yaw   = ((nose.x - midX) / faceW) * 90;
    const pitch = ((nose.y - midY) / faceH) * 70;

    return { yaw, pitch };
  }

  /**
   * Draw oval tracking the face + landmark dots.
   * isMatch: null=idle/inactive, false=capturing but incorrect, true=correct pose
   */
  function drawMesh(lm, isMatch) {
    const w = meshCanvas.width  = video.videoWidth  || 640;
    const h = meshCanvas.height = video.videoHeight || 480;
    const ctx = meshCanvas.getContext('2d');
    ctx.clearRect(0, 0, w, h);

    // --- Calculate bounding box from eye contour landmarks ---
    const OVAL_IDX = [
      10,338,297,332,284,251,389,356,454,323,361,288,
      397,365,379,378,400,377,152,148,176,149,150,136,
      172,58,132,93,234,127,162,21,54,103,67,109
    ];
    let minX=1, maxX=0, minY=1, maxY=0;
    for (const i of OVAL_IDX) {
      const p = lm[i];
      if (p.x < minX) minX = p.x;
      if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.y > maxY) maxY = p.y;
    }
    const pad = 0.018;
    const cx  = ((minX + maxX) / 2) * w;
    const cy  = ((minY + maxY) / 2) * h;
    const rx  = ((maxX - minX) / 2 + pad) * w;
    const ry  = ((maxY - minY) / 2 + pad * 1.4) * h;

    // --- Draw oval ---
    const color = isMatch === true ? '#4ade80'
                : isMatch === false ? 'rgba(255,255,255,0.75)'
                : 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = color;
    ctx.lineWidth   = isMatch === true ? 3 : 2;
    ctx.setLineDash(isMatch === null ? [10,6] : []);
    ctx.shadowColor = isMatch === true ? '#4ade80' : 'transparent';
    ctx.shadowBlur  = isMatch === true ? 12 : 0;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.shadowBlur = 0;

    // --- Landmark dots (only when capturing) ---
    if (isCapturing) {
      ctx.fillStyle = 'rgba(99,202,183,0.35)';
      for (const p of lm) {
        ctx.beginPath();
        ctx.arc(p.x * w, p.y * h, 1.0, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  /** Callback for each frame from MediaPipe */
  function onFaceResults(results) {
    if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) {
      meshCanvas.getContext('2d').clearRect(0, 0, meshCanvas.width, meshCanvas.height);
      if (isCapturing) {
        poseIndicator.style.display = 'block';
        poseIndicator.textContent = '🔍 No face detected';
        poseIndicator.style.color = '#fbbf24';
        holdRing.style.display = 'none';
        stableStart = 0;
      }
      return;
    }

    const lm   = results.multiFaceLandmarks[0];
    const pose = estimatePose(lm);

    if (isCapturing) {
      const isMatch = currentStep < CAPTURE_TARGETS.length
        ? CAPTURE_TARGETS[currentStep].check(pose) : false;
      drawMesh(lm, isMatch);
      handleCapture(pose);
    } else {
      drawMesh(lm, null);
    }
  }

  /** Initialize MediaPipe FaceMesh (lazy, only called once) */
  function initFaceMesh() {
    if (faceMeshReady) return;
    faceMeshReady = true;

    const fm = new FaceMesh({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
    });
    fm.setOptions({
      maxNumFaces: 1,
      refineLandmarks: false,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5,
    });
    fm.onResults(onFaceResults);

    mpCamera = new Camera(video, {
      onFrame: async () => { await fm.send({ image: video }); },
      width: 640,
      height: 480,
    });
    mpCamera.start();
  }

  // ─────────────────────────────────────────────
  //  Capture logic
  // ─────────────────────────────────────────────
  function handleCapture(pose) {
    if (currentStep >= CAPTURE_TARGETS.length) return;

    const target = CAPTURE_TARGETS[currentStep];

    // After a step is captured, wait until user leaves the previous pose zone
    if (poseResetRequired) {
      const prevTarget = CAPTURE_TARGETS[currentStep - 1];
      const stillInPrevPose = prevTarget.check(pose);
      poseIndicator.style.display = 'block';
      if (stillInPrevPose) {
        poseIndicator.textContent = `Step ${currentStep + 1}/${CAPTURE_TARGETS.length}: ${target.label}`;
        poseIndicator.style.color = '#fbbf24';
        stableStart = 0;
        holdRing.style.display = 'none';
        ringFill.style.strokeDashoffset = RING_CIRC;
        return;
      } else {
        // User has moved away — unlock next step
        poseResetRequired = false;
        stableStart = 0;
      }
    }

    const isMatch = target.check(pose);

    // Update indicator text
    poseIndicator.style.display = 'block';
    if (isMatch) {
      poseIndicator.textContent = '✅ Hold still...';
      poseIndicator.style.color = '#4ade80';
    } else {
      poseIndicator.textContent = `Step ${currentStep + 1}/${CAPTURE_TARGETS.length}: ${target.label}`;
      poseIndicator.style.color = '#fff';
    }

    if (isMatch) {
      if (stableStart === 0) stableStart = Date.now();
      const held     = Date.now() - stableStart;
      const progress = Math.min(held / STABLE_MS, 1);

      holdRing.style.display = 'block';
      ringFill.style.strokeDashoffset = RING_CIRC * (1 - progress);

      if (held >= STABLE_MS) captureStep();
    } else {
      stableStart = 0;
      holdRing.style.display = 'none';
      ringFill.style.strokeDashoffset = RING_CIRC;
    }
  }

  function captureStep() {
    if (isProcessingCapture) return;
    isProcessingCapture = true;

    // Flash
    captureFlash.classList.add('show');
    setTimeout(() => captureFlash.classList.remove('show'), 160);

    // Draw frame on canvas (mirror flipped to send to server in the correct orientation)
    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0);
    ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => {
      isProcessingCapture = false;
      capturedBlobs.push(blob);

      // Update icon for completed step
      const doneId = CAPTURE_TARGETS[currentStep].id;
      document.getElementById(`icon-${doneId}`).className = 'pose-step-icon done';
      document.getElementById(`lbl-${doneId}`).className  = 'pose-step-label done';

      currentStep++;
      stableStart           = 0;
      poseResetRequired     = Date.now() > 0; // true — must leave previous pose before next step
      holdRing.style.display = 'none';
      ringFill.style.strokeDashoffset = RING_CIRC;

      if (currentStep >= CAPTURE_TARGETS.length) {
        // All completed
        isCapturing = false;
        clearTimeout(timeoutId);
        poseIndicator.style.display = 'none';
        meshCanvas.getContext('2d').clearRect(0, 0, meshCanvas.width, meshCanvas.height);
        uploadBlobs();
      } else {
        // Activate next step
        const nextId = CAPTURE_TARGETS[currentStep].id;
        document.getElementById(`icon-${nextId}`).className = 'pose-step-icon active';
        document.getElementById(`lbl-${nextId}`).className  = 'pose-step-label active';
        showResult('info', `Step ${currentStep + 1}/${CAPTURE_TARGETS.length}: ${CAPTURE_TARGETS[currentStep].label}`);
      }
    }, 'image/jpeg', 0.88);
  }

  // ─────────────────────────────────────────────
  //  Build pose step indicators HTML
  // ─────────────────────────────────────────────
  function buildStepIcons() {
    poseStepsEl.innerHTML = CAPTURE_TARGETS.map((t, i) => `
      <div class="pose-step">
        <div class="pose-step-icon${i === 0 ? ' active' : ''}" id="icon-${t.id}">${t.emoji}</div>
        <div class="pose-step-label${i === 0 ? ' active' : ''}" id="lbl-${t.id}">${t.label}</div>
      </div>
    `).join('');
  }

  // ─────────────────────────────────────────────
  //  Start / Cancel
  // ─────────────────────────────────────────────
  registerBtn.addEventListener('click', () => {
    const name = nameInput.value.trim();
    if (!name) {
      showResult('error', 'Please enter employee name!');
      nameInput.focus();
      return;
    }
    if (registerBtn.disabled) return;

    // Lazy init MediaPipe
    initFaceMesh();

    isCapturing   = true;
    currentStep   = 0;
    capturedBlobs = [];
    stableStart   = 0;

    registerBtn.style.display = 'none';
    cancelBtn.style.display   = 'block';

    buildStepIcons();
    poseStepsEl.style.display = 'flex';

    showResult('info', `Step 1/${CAPTURE_TARGETS.length}: ${CAPTURE_TARGETS[0].label}`);

    timeoutId = setTimeout(() => {
      if (isCapturing) {
        resetState();
        showResult('error', `⏱ Timeout: did not capture all ${CAPTURE_TARGETS.length} angles.`);
      }
    }, TIMEOUT_MS);
  });

  cancelBtn.addEventListener('click', () => {
    resetState();
    showResult('error', 'Registration cancelled.');
  });

  function resetState() {
    isCapturing   = false;
    currentStep   = 0;
    capturedBlobs = [];
    stableStart   = 0;
    isProcessingCapture = false;
    stepCooldownEnd     = 0;
    clearTimeout(timeoutId);

    registerBtn.style.display = 'block';
    registerBtn.disabled = false;
    registerBtn.innerHTML = '<span>📸</span> Capture &amp; Register';
    cancelBtn.style.display = 'none';
    poseStepsEl.style.display = 'none';
    poseIndicator.style.display = 'none';
    holdRing.style.display = 'none';
    ringFill.style.strokeDashoffset = RING_CIRC;
    guideOverlay.style.borderColor = 'rgba(255,255,255,0.2)';
    meshCanvas.getContext('2d').clearRect(0, 0, meshCanvas.width, meshCanvas.height);
  }

  // ─────────────────────────────────────────────
  //  Upload — call server ONLY once
  // ─────────────────────────────────────────────
  async function uploadBlobs() {
    cancelBtn.style.display   = 'none';
    registerBtn.style.display = 'block';
    registerBtn.disabled      = true;
    registerBtn.innerHTML     = '<span class="spinner"></span> Processing...';
    showResult('info', `⚙️ Processing ${capturedBlobs.length} photos...`);

    const fd = new FormData();
    capturedBlobs.forEach((b, i) => fd.append('files', b, `cap_${i}.jpg`));
    fd.append('name', nameInput.value.trim());

    try {
      const resp = await fetch(`${API_BASE}/register`, { method: 'POST', body: fd });
      const data = await resp.json();

      if (resp.ok && data.status === 'success') {
        showResult('success', `✅ ${data.message}`);
        nameInput.value = '';
        poseStepsEl.style.display = 'none';
      } else {
        showResult('error', `❌ ${data.detail?.message || data.message || 'Unknown error'}`);
        poseStepsEl.style.display = 'none';
      }
    } catch {
      showResult('error', '❌ Cannot connect to server.');
      poseStepsEl.style.display = 'none';
    }

    registerBtn.disabled = false;
    registerBtn.innerHTML = '<span>📸</span> Capture &amp; Register';
  }

  // ─────────────────────────────────────────────
  //  Helpers
  // ─────────────────────────────────────────────
  function showResult(type, msg) {
    resultMsg.className = `result-msg ${type}`;
    resultMsg.textContent = msg;
  }

  nameInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') registerBtn.click();
  });
</script>
</body>
</html>
